name: SonarCloud

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  sonar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Debug paths
        run: |
          pwd
          ls -la
          find . -maxdepth 3 \( -name "pom.xml" -o -name "mvnw" \)

      # Если pom.xml в корне репозитория, оставь working-directory: .
      # Если проект в подпапке (например TaskBoard), поставь working-directory: TaskBoard
      - name: Build and test (JaCoCo)
        working-directory: .
        run: mvn -B clean verify

      - name: Sonar analyze
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=ykleyka
          -Dsonar.projectKey=ykleyka_TaskBoard
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
